<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Lodestar — Personal Network Navigator</title>
  <link rel="stylesheet" href="/static/style.css?v=20260423-pair-suggest">
  <script src="/static/cytoscape.min.js"></script>
  <script src="/static/echarts.min.js"></script>
  <script defer src="/static/app.js?v=20260423-pair-suggest-scroll"></script>
  <script defer src="/static/alpine.min.js"></script>
</head>
<body x-data="appState()" x-init="init()" :class="searching ? 'searching' : ''">

  <!-- ============================================================
       Mount unlock modal (一人一库 / 切 tab 必重输)
       ============================================================ -->
  <template x-if="showUnlockModal">
    <div class="modal-bg mount-unlock-bg">
      <div class="modal mount-unlock-modal" @click.stop>
        <div class="unlock-icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="11" width="16" height="10" rx="2"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          </svg>
        </div>
        <h2>解锁网络</h2>
        <p class="unlock-subtitle">
          <span class="mono" x-text="mount?.display_name || mountSlug"></span>
          <span class="unlock-sep">·</span>
          <span class="unlock-hint">每次切换标签都需要重新输入密码</span>
        </p>
        <div class="field">
          <input id="mount-unlock-pw" type="password"
                 x-model="unlockPassword"
                 @keydown.enter="submitUnlock()"
                 autocomplete="current-password"
                 placeholder="输入密码">
        </div>
        <template x-if="unlockError">
          <p class="unlock-error" x-text="unlockError"></p>
        </template>
        <div class="modal-actions">
          <button type="button" class="btn" @click="cancelUnlock()">取消</button>
          <button type="button" class="btn primary"
                  :disabled="unlockBusy"
                  @click="submitUnlock()">
            <span x-text="unlockBusy ? '校验中…' : '解锁'"></span>
          </button>
        </div>
      </div>
    </div>
  </template>

  <!-- ============================================================
       Inline SVG icon sprite
       ============================================================ -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="i-search" viewBox="0 0 16 16">
        <circle cx="7" cy="7" r="5" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <line x1="11" y1="11" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </symbol>
      <symbol id="i-path" viewBox="0 0 16 16">
        <path d="M2 5 H12 M10 3 L12 5 L10 7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14 11 H4 M6 9 L4 11 L6 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="i-broker" viewBox="0 0 16 16">
        <circle cx="3" cy="8" r="1.75" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="13" cy="8" r="1.75" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M4.75 8 H11.25" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </symbol>
      <symbol id="i-plus" viewBox="0 0 16 16">
        <path d="M8 3 V13 M3 8 H13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </symbol>
      <symbol id="i-filter" viewBox="0 0 16 16">
        <line x1="2" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="2" y1="12" x2="14" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="5" cy="4" r="1.5" fill="currentColor"/>
        <circle cx="10" cy="8" r="1.5" fill="currentColor"/>
        <circle cx="6" cy="12" r="1.5" fill="currentColor"/>
      </symbol>
      <symbol id="i-chart" viewBox="0 0 16 16">
        <rect x="2" y="9" width="2.5" height="5" fill="currentColor" rx="0.5"/>
        <rect x="6.75" y="5" width="2.5" height="9" fill="currentColor" rx="0.5"/>
        <rect x="11.5" y="2" width="2.5" height="12" fill="currentColor" rx="0.5"/>
      </symbol>
      <symbol id="i-close" viewBox="0 0 16 16">
        <path d="M4 4 L12 12 M12 4 L4 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </symbol>
      <symbol id="i-arrow" viewBox="0 0 16 16">
        <path d="M3 8 H13 M10 5 L13 8 L10 11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="i-link" viewBox="0 0 16 16">
        <path d="M6.5 9.5 L9.5 6.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M9 4 L11 2 A2 2 0 0 1 14 5 L12 7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M7 9 L5 11 A2 2 0 0 1 2 8 L4 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="i-edit" viewBox="0 0 16 16">
        <path d="M3 13 L3 11 L11 3 L13 5 L5 13 Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </symbol>
      <symbol id="i-trash" viewBox="0 0 16 16">
        <path d="M3 4 H13 M5 4 L5 2 H11 L11 4 M4 4 L5 14 H11 L12 4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
    </defs>
  </svg>

  <!-- Cytoscape canvas -->
  <div id="cy"></div>

  <!-- ========== Top bar ========== -->
  <div class="topbar">
    <div class="brand"><span class="brand-mark" aria-hidden="true"></span>Lodestar</div>

    <!-- Mount tabs: switch between Richard / Tommy / ...; full-page
         reload guarantees the unlock token is dropped (切 tab 必重输). -->
    <template x-if="mounts.length > 1">
      <div class="mount-tabs" role="tablist" aria-label="切换网络">
        <template x-for="m in mounts" :key="m.slug">
          <button
            type="button"
            role="tab"
            class="mount-tab"
            :class="{ 'is-active': mountSlug === m.slug, 'is-locked': m.locked }"
            :aria-selected="mountSlug === m.slug"
            :title="m.locked ? '已设置网页密码（切到此标签需重输）' : ''"
            @click="switchMount(m.slug)">
            <template x-if="m.locked">
              <svg class="mount-lock" width="11" height="11" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="4" y="11" width="16" height="10" rx="2"/>
                <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
              </svg>
            </template>
            <span class="mount-name" x-text="m.display_name"></span>
            <span class="mount-count" x-text="m.contact_count"></span>
          </button>
        </template>
      </div>
    </template>

    <div class="search-box">
      <span class="icon"><svg class="ico" width="14" height="14"><use href="#i-search"/></svg></span>
      <input id="search-input" type="text" x-model="query"
             @keydown.enter="runSearch()"
             placeholder="说说你想找谁、想聊什么，例如「找量化私募聊因子」">
      <template x-if="query">
        <button type="button" class="clear" @click="clearSearch()" title="清除">
          <svg width="12" height="12"><use href="#i-close"/></svg>
        </button>
      </template>
      <button type="button"
              class="search-submit"
              :disabled="searching"
              :aria-busy="searching"
              @click="runSearch()"
              title="查询 (Enter)">
        <span x-text="searching ? '检索中…' : '查询'"></span>
      </button>
      <label class="toggle" title="跳过 LLM 解析，直接关键词匹配">
        <input type="checkbox" x-model="noLLM"> RAW
      </label>
    </div>
    <button class="btn" @click="enterTwoPerson()" title="找两人之间的路径">
      <svg class="ico" width="14" height="14"><use href="#i-path"/></svg>
      <span>双人路径</span>
    </button>
    <button class="btn" @click="openIntros()" title="发现你能撮合的双方">
      <svg class="ico" width="14" height="14"><use href="#i-broker"/></svg>
      <span>引荐</span>
    </button>
    <button class="btn primary" @click="openAdd()" title="添加联系人 (N)">
      <svg class="ico" width="14" height="14"><use href="#i-plus"/></svg>
      <span>新联系人</span>
    </button>
    <button class="btn" @click="openRelationParse()"
            title="用一句话描述谁认识谁，AI 解析后入库">
      <svg class="ico" width="14" height="14"><use href="#i-link"/></svg>
      <span>新关系</span>
    </button>
    <button class="btn" @click="toggleRelationsDrawer()"
            :class="{ 'is-active': showRelationsDrawer }"
            title="浏览/编辑当前网络的全部关系">
      <span style="font-weight: 600; letter-spacing: .02em;">关系</span>
    </button>
    <button class="btn" @click="openBatchEnrich()"
            title="对当前网络下所有联系人做 AI 解析（缺字段才跑）">
      <span style="font-weight: 600; letter-spacing: .02em;">AI 解析</span>
    </button>
    <button class="btn icon-only" @click="showHelp = true" title="快捷键 (?)">?</button>
  </div>

  <template x-if="viewMode === 'ambient' && !query && !detail && !twoPersonMode">
    <div class="ambient-hint" x-text="ambientHint"></div>
  </template>

  <!-- ========== Two-person path mode banner ========== -->
  <template x-if="twoPersonMode">
    <div class="mode-banner">
      <span>双人路径</span>
      <div class="pair-field">
        <input class="pair-input" type="text"
               x-model="pathStartInput"
               @focus="pathStartFocused = true"
               @blur="hidePairSuggest('start')"
               @input="pathStartFocused = true"
               @keydown.enter.prevent="resolvePathEndpoint('start')"
               @keydown.escape="pathStartFocused = false"
               placeholder="起点：输入名字或点图" />
        <div class="pair-suggest" x-show="pathStartFocused && pairMatches(pathStartInput).length > 0" x-transition.opacity>
          <template x-for="m in pairMatches(pathStartInput)" :key="m.id">
            <div class="pair-suggest-row" @mousedown.prevent="pickPathEndpoint('start', m)">
              <span class="name" x-text="m.label"></span>
            </div>
          </template>
        </div>
      </div>
      <svg width="12" height="12" style="color:var(--text-muted)"><use href="#i-arrow"/></svg>
      <div class="pair-field">
        <input class="pair-input" type="text"
               x-model="pathEndInput"
               @focus="pathEndFocused = true"
               @blur="hidePairSuggest('end')"
               @input="pathEndFocused = true"
               @keydown.enter.prevent="resolvePathEndpoint('end')"
               @keydown.escape="pathEndFocused = false"
               placeholder="终点：输入名字或点图" />
        <div class="pair-suggest" x-show="pathEndFocused && pairMatches(pathEndInput).length > 0" x-transition.opacity>
          <template x-for="m in pairMatches(pathEndInput)" :key="m.id">
            <div class="pair-suggest-row" @mousedown.prevent="pickPathEndpoint('end', m)">
              <span class="name" x-text="m.label"></span>
            </div>
          </template>
        </div>
      </div>
      <button @click="exitTwoPerson()">退出</button>
    </div>
  </template>

  <!-- ========== Filters panel ========== -->
  <div class="panel panel-filters" x-show="showFilters" x-transition>
    <h3>过滤
      <span class="ct" x-text="`${filters.industries.length} active`"></span>
      <button class="close" @click="showFilters = false">
        <svg width="12" height="12"><use href="#i-close"/></svg>
      </button>
    </h3>
    <div class="filter-group">
      <div class="label">行业</div>
      <div class="chip-row">
        <template x-for="[name, color] in industriesList.slice(0, 9)" :key="name">
          <span class="chip"
                :class="filters.industries.includes(name) ? 'active' : ''"
                @click="toggleIndustry(name)">
            <span class="swatch" :style="`background:${color}`"></span>
            <span x-text="name"></span>
          </span>
        </template>
      </div>
    </div>
    <div class="filter-group">
      <div class="label">最低可信度</div>
      <input type="range" min="0" max="5" step="1" class="range"
             :value="filters.minStrength"
             @input="setMinStrength($event.target.value)">
      <div class="range-row">
        <span x-text="filters.minStrength === 0 ? 'ALL' : `≥ ${filters.minStrength}`"></span>
        <button class="chip" @click="clearFilters()">重置</button>
      </div>
    </div>
    <div class="filter-group">
      <div class="label">名字 / 标签</div>
      <input type="text" placeholder="输入关键词"
             x-model="filters.search"
             @input.debounce.300ms="applyFilters(filters)">
    </div>
  </div>

  <!-- ========== Top paths panel ========== -->
  <template x-if="(indirect.length + contacted.length) > 0 && viewMode === 'intent'">
    <div class="panel panel-paths">
      <h3 x-text="pathMode ? '双人路径' : '引荐路径'">引荐路径
        <span class="ct"
              x-text="pathMode
                ? `${indirect.length} 条候选 · 已按强度排序`
                : `${contacted.length} 已联系 · ${indirect.length} 需引荐`"></span>
        <button class="close" @click="clearSearch()">
          <svg width="12" height="12"><use href="#i-close"/></svg>
        </button>
      </h3>
      <div x-show="intent" style="margin-bottom:10px;">
        <span class="intent-chip" x-text="`→ ${intent}`"></span>
      </div>

      <!-- 需引荐（多跳路径 / 双人路径候选） -->
      <template x-if="indirect.length > 0">
        <div class="path-section">
          <div class="path-section-head">
            <span class="kind-dot kind-target"></span>
            <span x-text="pathMode ? '可行路径' : '需要引荐的人'"></span>
            <span class="hint"
                  x-text="pathMode
                    ? `从 ${pairLabels && pairLabels.start} 到 ${pairLabels && pairLabels.end}，点击切换`
                    : '圈内有人可代为引荐'"></span>
          </div>
          <template x-for="(p, idx) in indirect" :key="'t-'+idx+'-'+p.target_id">
            <div class="path-row path-row-target"
                 :class="{ 'is-active': activePathKey === 't-'+idx+'-'+p.target_id }"
                 @click="highlightPath(p, 't-'+idx+'-'+p.target_id)">
              <span class="rank" x-text="String(idx + 1).padStart(2, '0')"></span>
              <div class="body">
                <div class="name-line">
                  <span class="name" x-text="p.target_name"></span>
                  <span class="kind-chip kind-chip-target"
                        x-text="`${p.path.length - 1} 跳`"></span>
                  <template x-if="p.is_wishlist">
                    <span class="kind-chip kind-chip-wishlist" title="你标记为还没直接联系到（关系类型=未联系）">★ 未联系</span>
                  </template>
                </div>
                <div class="path-chain">
                  <template x-for="(s, i) in p.path" :key="i">
                    <span>
                      <span class="chain-node"
                            :class="{ 'is-me': i === 0,
                                      'is-target': i === p.path.length - 1 }"
                            x-text="s.name"></span>
                      <template x-if="i < p.path.length - 1">
                        <span class="chain-arrow">→</span>
                      </template>
                    </span>
                  </template>
                </div>
                <div class="path-context"
                     x-text="pathContextLine(p)"></div>
                <div class="path-next" x-text="nextStepText(p)"></div>
              </div>
              <span class="score" x-text="p.combined_score.toFixed(2)"></span>
            </div>
          </template>
        </div>
      </template>

      <!-- 已联系（按强度从强到弱排序；strength=1 自然排在末尾） -->
      <template x-if="contacted.length > 0">
        <div class="path-section">
          <div class="path-section-head">
            <span class="kind-dot kind-direct"></span>
            <span>你已联系的人</span>
            <span class="hint">按可信度从强到弱排序，可立即联系</span>
          </div>
          <template x-for="(p, idx) in contacted" :key="'c'+p.target_id">
            <div class="path-row"
                 :class="{
                   'is-active': activePathKey === 'c'+p.target_id,
                   'path-row-weak': p.path_kind === 'weak'
                 }"
                 @click="highlightPath(p, 'c'+p.target_id)">
              <span class="rank" x-text="String(idx + 1).padStart(2, '0')"></span>
              <div class="body">
                <div class="name-line">
                  <span class="name" x-text="p.target_name"></span>
                  <span class="kind-chip"
                        :class="p.path_kind === 'weak' ? 'kind-chip-weak' : 'kind-chip-direct'"
                        x-text="p.path_kind === 'weak' ? '强度 1' : '已联系'"></span>
                  <template x-if="p.is_wishlist">
                    <span class="kind-chip kind-chip-wishlist" title="你标记为还没直接联系到（关系类型=未联系）">★ 未联系</span>
                  </template>
                </div>
                <div class="path-context" x-text="pathContextLine(p)"></div>
              </div>
              <span class="score" x-text="p.combined_score.toFixed(2)"></span>
            </div>
          </template>
        </div>
      </template>
    </div>
  </template>

  <template x-if="focusSummary && viewMode === 'focus' && !detail">
    <div class="panel panel-focus">
      <div class="focus-kicker">速览</div>
      <div class="focus-header">
        <div class="avatar"
             :style="`background:${focusSummary.color}20; color:${focusSummary.color}; border-color:${focusSummary.color}40;`"
             x-text="focusSummary.name.charAt(0)"></div>
        <div>
          <div class="name" x-text="focusSummary.name"></div>
          <div class="industry" x-text="focusSummary.industry"></div>
        </div>
      </div>
      <div class="focus-headline" x-text="focusSummary.headline"></div>
      <div class="focus-reason" x-text="focusSummary.reason"></div>
      <template x-if="focusSummary.strength">
        <div class="focus-meter-row">
          <span class="focus-meter-label">可信度</span>
          <div class="bars bars-compact">
            <template x-for="i in 5" :key="i">
              <div class="bar" :class="i <= focusSummary.strength ? 'on' : ''"></div>
            </template>
          </div>
        </div>
      </template>
      <div class="focus-row focus-row-quiet">
        <span>图上邻居</span>
        <span class="mono" x-text="`${focusSummary.neighborCount}`"></span>
      </div>
      <div class="detail-actions focus-actions">
        <button class="btn btn-primary-soft" @click="focusNode(focusSummary.id)">打开档案</button>
      </div>
    </div>
  </template>

  <!-- ========== Detail panel ========== -->
  <template x-if="detail">
    <div class="panel panel-detail">
      <button class="close" @click="clearDetail()">
        <svg width="12" height="12"><use href="#i-close"/></svg>
      </button>
      <div class="detail-kicker">联系人档案</div>
      <div class="detail-header">
        <div class="avatar"
             :style="`background:${detail.color}20; color:${detail.color}; border-color:${detail.color}40;`"
             x-text="detail.name.charAt(0)"></div>
        <div>
          <div class="name" x-text="detail.name"></div>
          <div class="industry" x-text="detail.industry"></div>
        </div>
      </div>

      <template x-if="detail.strength_to_me">
        <div class="detail-section">
          <div class="label">可信度</div>
          <div class="bars">
            <template x-for="i in 5" :key="i">
              <div class="bar" :class="i <= detail.strength_to_me ? 'on' : ''"></div>
            </template>
          </div>
        </div>
      </template>

      <template x-if="detail.bio">
        <div class="detail-section">
          <div class="label">简介</div>
          <template x-if="bioPairs(detail.bio)">
            <dl class="bio-kv">
              <template x-for="(p, i) in bioPairs(detail.bio)" :key="i">
                <div class="bio-kv-row">
                  <dt x-text="p.key"></dt>
                  <dd x-text="p.value"></dd>
                </div>
              </template>
            </dl>
          </template>
          <template x-if="!bioPairs(detail.bio)">
            <div class="value" x-text="detail.bio"></div>
          </template>
        </div>
      </template>

      <template x-if="detail.tags && detail.tags.length">
        <div class="detail-section">
          <div class="label">标签</div>
          <div>
            <template x-for="t in detail.tags" :key="t">
              <span class="tag" x-text="t"></span>
            </template>
          </div>
        </div>
      </template>

      <template x-if="detail.skills && detail.skills.length">
        <div class="detail-section">
          <div class="label">技能</div>
          <div>
            <template x-for="t in detail.skills" :key="t">
              <span class="tag skill" x-text="t"></span>
            </template>
          </div>
        </div>
      </template>

      <template x-if="detail.companies && detail.companies.length && detailShowExtraCompany(detail)">
        <div class="detail-section">
          <div class="label">公司</div>
          <div class="value" x-text="detail.companies.join(' · ')"></div>
        </div>
      </template>

      <template x-if="detail.cities && detail.cities.length && detailShowExtraCity(detail)">
        <div class="detail-section">
          <div class="label">城市</div>
          <div class="value" x-text="detail.cities.join(' · ')"></div>
        </div>
      </template>

      <template x-if="detail.needs && detail.needs.length">
        <div class="detail-section">
          <div class="label">需求</div>
          <div>
            <template x-for="t in detail.needs" :key="t">
              <span class="tag need" x-text="t"></span>
            </template>
          </div>
        </div>
      </template>

      <template x-if="detail.notes">
        <div class="detail-section">
          <div class="label">私人备注</div>
          <div class="value" x-text="detail.notes"></div>
        </div>
      </template>

      <template x-if="detail.related && detail.related.length">
        <div class="detail-section">
          <div class="label" x-text="`关系 · ${detail.related.length}`"></div>
          <template x-for="r in detail.related" :key="r.id">
            <div class="related-row" @click="focusNode(r.id)">
              <span x-text="r.name"></span>
              <span class="strength" x-text="`${r.strength}/5`"></span>
            </div>
          </template>
        </div>
      </template>

      <template x-if="!detail.is_me">
        <div class="detail-actions">
          <button class="btn" @click="enterTwoPerson(); pathStart = detail; clearDetail()"
                  title="把此人作为路径起点">设为起点</button>
          <button class="btn"
                  :disabled="aiPersonBusy === detail.id"
                  @click="aiReparseCurrent()"
                  title="用 AI 从此人的简介/备注里再抽一次结构化字段，合并进现有内容">
            <span x-text="aiPersonBusy === detail.id ? 'AI 解析中…' : 'AI 重新解析'"></span>
          </button>
          <button class="btn danger" @click="deleteCurrent()">删除</button>
        </div>
      </template>
    </div>
  </template>

  <!-- ========== Stats panel ========== -->
  <template x-if="stats && showStats">
    <div class="panel panel-stats">
      <h3>数据概览
        <button class="close" @click="showStats = false">
          <svg width="12" height="12"><use href="#i-close"/></svg>
        </button>
      </h3>
      <div class="stat-grid">
        <div class="stat">
          <div class="num" x-text="stats.total_contacts"></div>
          <div class="lbl">Contacts</div>
        </div>
        <div class="stat">
          <div class="num" x-text="stats.total_relationships"></div>
          <div class="lbl">Relations</div>
        </div>
      </div>
      <div id="stats-chart"></div>
    </div>
  </template>

  <!-- ========== Add modal ========== -->
  <template x-if="showAdd">
    <div class="modal-bg" @click.self="showAdd = false">
      <div class="modal">
        <h2>新增联系人</h2>
        <p>添加到你的人脉图。简介会用于语义检索。</p>
        <div class="field">
          <label>姓名 <span style="color:var(--danger)">*</span></label>
          <input type="text" x-model="newPerson.name" placeholder="必填">
        </div>
        <div class="field">
          <label>简介</label>
          <textarea x-model="newPerson.bio"
                    placeholder="一段话描述这个人，会用于语义检索"></textarea>
        </div>
        <div class="field">
          <label>标签（; 或 , 分隔）</label>
          <input type="text" x-model="newPerson.tags"
                 placeholder="例如：私募基金;投资人;靠谱">
        </div>
        <div class="field">
          <label>技能</label>
          <input type="text" x-model="newPerson.skills" placeholder="量化策略;风控">
        </div>
        <div class="field">
          <label>公司</label>
          <input type="text" x-model="newPerson.companies" placeholder="某某资管">
        </div>
        <div class="field">
          <label>城市</label>
          <input type="text" x-model="newPerson.cities" placeholder="上海">
        </div>
        <div class="field">
          <label>需求（此人在找什么）</label>
          <input type="text" x-model="newPerson.needs" placeholder="客户资源;一级项目">
        </div>
        <div class="field">
          <label>私人备注</label>
          <textarea x-model="newPerson.notes" placeholder="只你能看见"></textarea>
        </div>
        <div class="field">
          <label>关系</label>
          <div style="display:flex; gap: 8px;">
            <select x-model="newPerson.strength_to_me" style="flex: 0 0 108px;">
              <option value="1">1 · 远</option>
              <option value="2">2</option>
              <option value="3">3 · 中</option>
              <option value="4">4</option>
              <option value="5">5 · 近</option>
            </select>
            <select x-model="newPerson.frequency" style="flex: 0 0 108px;">
              <option value="weekly">每周</option>
              <option value="monthly">每月</option>
              <option value="quarterly">每季</option>
              <option value="yearly">每年</option>
              <option value="rare">极少</option>
            </select>
            <input type="text" x-model="newPerson.relation_context"
                   placeholder="如何认识 / 关系上下文" style="flex: 1;">
          </div>
        </div>
        <div class="field">
          <label style="display: flex; align-items: center; gap: 8px; text-transform: none; letter-spacing: 0;">
            <input type="checkbox" x-model="newPerson.embed" style="width:auto;">
            <span style="color: var(--text-secondary); font-size: 12px;">立即生成 embedding（需 API key）</span>
          </label>
        </div>

        <!-- AI parse: extract structured fields from bio/notes -->
        <div class="field">
          <div style="display: flex; gap: 8px; align-items: center;
                      justify-content: space-between;">
            <span style="color: var(--text-secondary); font-size: 12px;">
              用 AI 从「简介」+「私人备注」抽取公司 / 城市 / 标签
            </span>
            <button type="button" class="btn"
                    :disabled="aiPreviewBusy || (!newPerson.bio && !newPerson.notes)"
                    @click="aiPreviewForNewPerson()"
                    style="padding: 6px 12px;">
              <span x-text="aiPreviewBusy ? 'AI 解析中…' : 'AI 解析'"></span>
            </button>
          </div>
          <template x-if="aiPreviewError">
            <div style="margin-top: 6px; color: var(--danger); font-size: 12px;"
                 x-text="aiPreviewError"></div>
          </template>
          <template x-if="aiPreviewSummary">
            <div style="margin-top: 6px; color: var(--text-muted); font-size: 12px;"
                 x-text="aiPreviewSummary"></div>
          </template>
        </div>

        <div class="modal-actions">
          <button class="btn" @click="showAdd = false">取消</button>
          <button class="btn primary" @click="submitAdd()">保存</button>
        </div>
      </div>
    </div>
  </template>

  <!-- ========== Batch AI enrich modal ========== -->
  <template x-if="showBatchEnrich">
    <div class="modal-bg" @click.self="closeBatchEnrich()">
      <div class="modal">
        <h2>批量 AI 解析</h2>
        <p>
          对 <span x-text="mountLabel(mountSlug)"></span> 名下所有联系人跑一次结构化解析。
          姓名会先在本地脱敏成 <span style="font-family: var(--font-mono, monospace);">P001/P002…</span>
          再发到云端 LLM，结果回到本地后只做<strong>追加</strong>，不会删除已有字段。
        </p>

        <template x-if="!batchJob || batchJob.status === 'pending'">
          <div class="field">
            <label style="display: flex; align-items: center; gap: 8px; text-transform: none; letter-spacing: 0;">
              <input type="checkbox" x-model="batchOnlyMissing" style="width:auto;">
              <span style="color: var(--text-secondary); font-size: 12px;">
                只跑缺 companies / cities 的联系人（推荐）
              </span>
            </label>
          </div>
        </template>

        <template x-if="batchJob">
          <div style="margin-top: 12px;">
            <div style="display: flex; justify-content: space-between;
                        font-size: 12px; color: var(--text-secondary);
                        margin-bottom: 6px;">
              <span x-text="`状态：${batchStatusLabel(batchJob.status)}`"></span>
              <span x-text="`${batchJob.processed} / ${batchJob.total}`"></span>
            </div>
            <div style="width: 100%; height: 6px; background: var(--surface-2);
                        border-radius: 3px; overflow: hidden;">
              <div :style="`width: ${batchProgressPct()}%; height: 100%;
                            background: var(--accent, #6b7280);
                            transition: width .25s ease;`"></div>
            </div>
            <template x-if="batchJob.current_name && batchJob.status === 'running'">
              <div style="margin-top: 8px; color: var(--text-muted); font-size: 12px;"
                   x-text="`正在处理：${batchJob.current_name}`"></div>
            </template>
            <template x-if="batchJob.status === 'done'">
              <div style="margin-top: 8px; color: var(--text-secondary); font-size: 12px;">
                完成。本次更新 <strong x-text="batchJob.touched"></strong> 条记录，
                失败 <span x-text="batchJob.errors"></span> 条，
                耗时 <span x-text="batchJob.elapsed_seconds.toFixed(1)"></span> 秒。
              </div>
            </template>
            <template x-if="batchJob.status === 'error'">
              <div style="margin-top: 8px; color: var(--danger); font-size: 12px;"
                   x-text="`失败：${batchJob.error_message || '未知错误'}`"></div>
            </template>
          </div>
        </template>

        <div class="modal-actions">
          <template x-if="!batchJob || batchJob.status === 'done' || batchJob.status === 'error'">
            <button class="btn" @click="closeBatchEnrich()">关闭</button>
          </template>
          <template x-if="batchJob && (batchJob.status === 'pending' || batchJob.status === 'running')">
            <button class="btn" @click="closeBatchEnrich()"
                    title="后台仍会继续跑；下次再点开 AI 解析能继续看到进度">
              后台运行
            </button>
          </template>
          <template x-if="!batchJob || batchJob.status === 'done' || batchJob.status === 'error'">
            <button class="btn primary"
                    :disabled="batchStarting"
                    @click="startBatchEnrich()">
              <span x-text="batchJob && batchJob.status === 'done' ? '再跑一次' : (batchStarting ? '启动中…' : '开始解析')"></span>
            </button>
          </template>
        </div>
      </div>
    </div>
  </template>

  <!-- ========== Introductions modal ========== -->
  <template x-if="showIntros">
    <div class="modal-bg" @click.self="showIntros = false">
      <div class="modal">
        <h2>引荐推荐</h2>
        <p>基于「需求 ↔ 标签 / 技能 / 公司」匹配。你可以把 A 介绍给 B，让双方产生价值。</p>
        <template x-if="introductions.length === 0">
          <div class="empty">暂时没有匹配。给联系人补充「需求」字段会更准确。</div>
        </template>
        <template x-for="s in introductions" :key="s.provider_id + '-' + s.seeker_id">
          <div class="path-row" @click="showIntroPair(s.provider_id, s.seeker_id)">
            <span class="rank">⇌</span>
            <div class="body">
              <div class="name" x-text="`${s.seeker_name}  ⇌  ${s.provider_name}`"></div>
              <div class="meta" x-text="s.why"></div>
            </div>
          </div>
        </template>
        <div class="modal-actions">
          <button class="btn" @click="showIntros = false">关闭</button>
        </div>
      </div>
    </div>
  </template>

  <!-- ========== Help overlay ========== -->
  <template x-if="showHelp">
    <div class="help-overlay" @click.self="showHelp = false">
      <div class="help-card">
        <h2>快捷键</h2>
        <div class="row"><span class="kbd">/</span><span class="desc">聚焦搜索框</span></div>
        <div class="row"><span class="kbd">Enter</span><span class="desc">或点击「查询」执行搜索</span></div>
        <div class="row"><span class="kbd">N</span><span class="desc">新增联系人</span></div>
        <div class="row"><span class="kbd">F</span><span class="desc">全屏 / 退出</span></div>
        <div class="row"><span class="kbd">Esc</span><span class="desc">清除高亮 / 关闭面板</span></div>
        <div class="row"><span class="kbd">?</span><span class="desc">显示此帮助</span></div>
        <hr style="border: 0; border-top: 1px solid var(--border); margin: 16px 0;">
        <h2>交互</h2>
        <div class="row"><span class="desc">· 鼠标悬停节点 → 邻居扩散</span></div>
        <div class="row"><span class="desc">· 点击节点 → 打开详情</span></div>
        <div class="row"><span class="desc">· 滚轮缩放，拖拽平移</span></div>
        <div class="row"><span class="desc">· 双人路径：在顶栏输入两个名字（带补全），或在图上依次点两点</span></div>
        <div class="row"><span class="desc">· 引荐：自动扫描需求-能力匹配</span></div>
        <div class="modal-actions">
          <button class="btn primary" @click="showHelp = false">明白</button>
        </div>
      </div>
    </div>
  </template>

  <!-- ========== NL relationship parse modal ========== -->
  <template x-if="showRelationParse">
    <div class="modal-bg" @click.self="closeRelationParse()">
      <div class="modal modal-wide">
        <h2>用一句话加关系</h2>
        <p>
          描述谁认识谁，AI 会脱敏后解析成结构化提案。
          <strong>不会自动建联系人</strong>——文本里出现的陌生姓名只会出现在提示区，
          需先用「新联系人」录入再回来解析。
        </p>

        <div class="field">
          <label>自然语言描述</label>
          <textarea x-model="relationParseText"
                    rows="5"
                    placeholder="例如：老张和小李是同事，每月都聚一次。Mike 把小李介绍给我。"></textarea>
        </div>

        <div class="modal-actions" style="margin-top: 8px;">
          <button class="btn primary"
                  :disabled="relationParseBusy || !relationParseText.trim()"
                  @click="parseRelations()">
            <span x-text="relationParseBusy ? 'AI 解析中…' : '解析'"></span>
          </button>
          <template x-if="relationProposals.length || relationUnknown.length">
            <button class="btn"
                    @click="resetRelationParse()"
                    :disabled="relationParseBusy">重置</button>
          </template>
        </div>

        <template x-if="relationParseError">
          <div style="margin-top: 10px; color: var(--danger); font-size: 12px;"
               x-text="relationParseError"></div>
        </template>

        <template x-if="relationUnknown.length > 0">
          <div class="rel-unknown">
            <span class="rel-unknown-label">未识别的姓名：</span>
            <template x-for="n in relationUnknown" :key="n">
              <span class="rel-unknown-chip" x-text="n"></span>
            </template>
            <span class="rel-unknown-hint">先用「新联系人」录入，再回来解析。</span>
          </div>
        </template>

        <template x-if="relationProposals.length > 0">
          <div class="rel-preview">
            <div class="rel-preview-head">
              <span x-text="`AI 提议的边 · ${relationProposals.length} 条`"></span>
              <label style="display:flex; gap: 6px; align-items: center;
                            font-size: 12px; color: var(--text-muted);">
                <input type="checkbox"
                       :checked="relationProposals.every(p => p.selected)"
                       @change="toggleSelectAllProposals($event.target.checked)"
                       style="width:auto;">
                全选
              </label>
            </div>

            <template x-for="(p, idx) in relationProposals" :key="`pp-${idx}-${p.a_id}-${p.b_id}`">
              <div class="rel-row" :class="{ 'is-skipped': !p.selected }">
                <label class="rel-row-toggle">
                  <input type="checkbox" x-model="p.selected" style="width:auto;">
                </label>
                <div class="rel-row-body">
                  <div class="rel-row-head">
                    <span class="rel-name" x-text="p.a_name"></span>
                    <span class="rel-arrow">↔</span>
                    <span class="rel-name" x-text="p.b_name"></span>
                    <template x-if="p.existing_edge">
                      <span class="rel-existing-tag"
                            :class="`src-${p.existing_edge.source}`"
                            :title="`覆盖现有 ${relationSourceLabel(p.existing_edge.source)} 边 strength=${p.existing_edge.strength}`">
                        覆盖 <span x-text="relationSourceLabel(p.existing_edge.source)"></span> ·
                        现 <span x-text="p.existing_edge.strength"></span>
                      </span>
                    </template>
                    <template x-if="!p.existing_edge">
                      <span class="rel-new-tag">新</span>
                    </template>
                  </div>
                  <div class="rel-row-controls">
                    <label>
                      <span>强度</span>
                      <select x-model.number="p.strength">
                        <option :value="null">—</option>
                        <option :value="1">1 · 远</option>
                        <option :value="2">2</option>
                        <option :value="3">3 · 中</option>
                        <option :value="4">4</option>
                        <option :value="5">5 · 近</option>
                      </select>
                    </label>
                    <label>
                      <span>频率</span>
                      <select x-model="p.frequency">
                        <option :value="null">—</option>
                        <option value="weekly">每周</option>
                        <option value="monthly">每月</option>
                        <option value="quarterly">每季</option>
                        <option value="yearly">每年</option>
                        <option value="rare">极少</option>
                      </select>
                    </label>
                    <label class="rel-context-input">
                      <span>备注</span>
                      <input type="text" x-model="p.context" placeholder="如何认识 / 关系上下文">
                    </label>
                  </div>
                  <template x-if="p.rationale">
                    <div class="rel-row-rationale" x-text="`原文：${p.rationale}`"></div>
                  </template>
                  <template x-if="(relationContext[p.a_id] || []).length || (relationContext[p.b_id] || []).length">
                    <div class="rel-row-context">
                      <template x-if="(relationContext[p.a_id] || []).length">
                        <div>
                          <span class="rel-ctx-label" x-text="`${p.a_name} 现有：`"></span>
                          <template x-for="r in (relationContext[p.a_id] || []).slice(0, 4)" :key="r.id">
                            <span class="rel-ctx-pill"
                                  x-text="`${r.a_id === p.a_id ? r.b_name : r.a_name} (${r.strength})`"></span>
                          </template>
                          <template x-if="(relationContext[p.a_id] || []).length > 4">
                            <span class="rel-ctx-more"
                                  x-text="`+${(relationContext[p.a_id] || []).length - 4}`"></span>
                          </template>
                        </div>
                      </template>
                      <template x-if="(relationContext[p.b_id] || []).length">
                        <div>
                          <span class="rel-ctx-label" x-text="`${p.b_name} 现有：`"></span>
                          <template x-for="r in (relationContext[p.b_id] || []).slice(0, 4)" :key="r.id">
                            <span class="rel-ctx-pill"
                                  x-text="`${r.a_id === p.b_id ? r.b_name : r.a_name} (${r.strength})`"></span>
                          </template>
                          <template x-if="(relationContext[p.b_id] || []).length > 4">
                            <span class="rel-ctx-more"
                                  x-text="`+${(relationContext[p.b_id] || []).length - 4}`"></span>
                          </template>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </template>

        <div class="modal-actions">
          <button class="btn" @click="closeRelationParse()">关闭</button>
          <template x-if="relationProposals.length > 0">
            <button class="btn primary"
                    :disabled="relationApplyBusy || selectedProposalCount() === 0"
                    @click="applySelectedRelations()">
              <span x-text="relationApplyBusy
                ? '入库中…'
                : `保存所选（${selectedProposalCount()}）`"></span>
            </button>
          </template>
        </div>
      </div>
    </div>
  </template>

  <!-- ========== Relationships drawer (browse / edit) ========== -->
  <template x-if="showRelationsDrawer">
    <div class="panel panel-relations" x-transition>
      <h3>关系
        <span class="ct" x-text="relationsTotal === relationships.length
          ? `${relationsTotal} 条`
          : `${relationships.length}/${relationsTotal}`"></span>
        <button class="close" @click="showRelationsDrawer = false">
          <svg width="12" height="12"><use href="#i-close"/></svg>
        </button>
      </h3>

      <div class="rel-filters">
        <input type="text"
               x-model="relationsFilter.q"
               placeholder="按姓名 / 备注过滤"
               @input.debounce.300ms="loadRelationships()">
        <div class="rel-filter-row">
          <label>
            <span>最低强度</span>
            <select x-model.number="relationsFilter.min_strength"
                    @change="loadRelationships()">
              <option :value="0">不限</option>
              <option :value="1">≥ 1</option>
              <option :value="2">≥ 2</option>
              <option :value="3">≥ 3</option>
              <option :value="4">≥ 4</option>
              <option :value="5">5</option>
            </select>
          </label>
          <label>
            <input type="checkbox"
                   x-model="relationsFilter.include_me"
                   @change="loadRelationships()">
            <span>含 me 边</span>
          </label>
        </div>
        <div class="chip-row" style="margin-top: 6px;">
          <template x-for="src in ['manual','colleague_inferred']" :key="src">
            <span class="chip"
                  :class="`src-${src} ${relationsFilter.sources.includes(src) ? 'active' : ''}`"
                  @click="toggleRelationSourceFilter(src)">
              <span class="swatch"></span>
              <span x-text="relationSourceLabel(src)"></span>
            </span>
          </template>
          <span class="chip src-ai_inferred is-disabled"
                title="L2 关系抽取尚未实现：将来从 bio/notes 自动抽 P↔P 关系，落 source=ai_inferred">
            <span class="swatch"></span>
            <span>AI 推断</span>
            <span class="chip-todo">TODO</span>
          </span>
        </div>
      </div>

      <template x-if="relationsLoading">
        <div class="empty">加载中…</div>
      </template>

      <template x-if="!relationsLoading && relationships.length === 0">
        <div class="empty">没有匹配的关系。换个筛选条件，或用「新关系」录入。</div>
      </template>

      <div class="rel-list">
        <template x-for="r in relationships" :key="r.id">
          <div class="rel-list-row">
            <template x-if="editingRelationId !== r.id">
              <div class="rel-list-display">
                <div class="rel-list-head">
                  <span class="rel-name"
                        :class="r.a_is_me ? 'is-me' : ''"
                        x-text="r.a_name"></span>
                  <span class="rel-arrow">—</span>
                  <span class="rel-name"
                        :class="r.b_is_me ? 'is-me' : ''"
                        x-text="r.b_name"></span>
                  <span class="rel-strength-pill"
                        :class="`s${r.strength}`"
                        x-text="r.strength"></span>
                  <span class="rel-source-pill"
                        :class="`src-${r.source}`">
                    <span class="swatch"></span>
                    <span x-text="relationSourceLabel(r.source)"></span>
                  </span>
                </div>
                <template x-if="r.context">
                  <div class="rel-list-context" x-text="r.context"></div>
                </template>
                <div class="rel-list-meta">
                  <span x-text="`频率：${frequencyLabel(r.frequency)}`"></span>
                </div>
              </div>
            </template>

            <template x-if="editingRelationId === r.id">
              <div class="rel-list-edit">
                <div class="rel-row-head">
                  <span class="rel-name" x-text="r.a_name"></span>
                  <span class="rel-arrow">—</span>
                  <span class="rel-name" x-text="r.b_name"></span>
                </div>
                <div class="rel-row-controls">
                  <label>
                    <span>强度</span>
                    <select x-model.number="editingRelation.strength">
                      <option :value="1">1 · 远</option>
                      <option :value="2">2</option>
                      <option :value="3">3 · 中</option>
                      <option :value="4">4</option>
                      <option :value="5">5 · 近</option>
                    </select>
                  </label>
                  <label>
                    <span>频率</span>
                    <select x-model="editingRelation.frequency">
                      <option value="weekly">每周</option>
                      <option value="monthly">每月</option>
                      <option value="quarterly">每季</option>
                      <option value="yearly">每年</option>
                      <option value="rare">极少</option>
                    </select>
                  </label>
                  <label class="rel-context-input">
                    <span>备注</span>
                    <input type="text" x-model="editingRelation.context" placeholder="备注">
                  </label>
                </div>
                <div class="rel-list-edit-actions">
                  <button class="btn"
                          @click="cancelEditRelation()">取消</button>
                  <button class="btn primary"
                          :disabled="editingRelationBusy"
                          @click="saveEditRelation()">
                    <span x-text="editingRelationBusy ? '保存中…' : '保存'"></span>
                  </button>
                </div>
              </div>
            </template>

            <template x-if="editingRelationId !== r.id">
              <div class="rel-list-actions">
                <button class="icon-btn" title="编辑" @click="startEditRelation(r)">
                  <svg width="13" height="13"><use href="#i-edit"/></svg>
                </button>
                <button class="icon-btn danger" title="删除" @click="deleteRelation(r)">
                  <svg width="13" height="13"><use href="#i-trash"/></svg>
                </button>
              </div>
            </template>
          </div>
        </template>
      </div>

      <template x-if="!relationsLoading && relationships.length < relationsTotal">
        <button class="btn rel-load-more"
                @click="loadMoreRelationships()"
                :disabled="relationsLoadingMore">
          <span x-text="relationsLoadingMore
            ? '加载中…'
            : `加载更多（剩 ${relationsTotal - relationships.length}）`"></span>
        </button>
      </template>
    </div>
  </template>

  <!-- ========== Toast ========== -->
  <template x-if="toast">
    <div class="toast" :class="toast.type === 'error' ? 'error' : ''" x-text="toast.msg"></div>
  </template>

  <!-- Floating toggle chips to re-open closed panels -->
  <template x-if="!showFilters">
    <button class="floating-toggle"
            style="top: 64px; left: 18px;"
            @click="showFilters = true">
      <svg class="ico" width="13" height="13"><use href="#i-filter"/></svg>
      <span>过滤</span>
    </button>
  </template>
  <template x-if="!showStats && stats">
    <button class="floating-toggle"
            style="bottom: 18px; right: 18px;"
            @click="showStats = true; $nextTick(() => renderChart())">
      <svg class="ico" width="13" height="13"><use href="#i-chart"/></svg>
      <span>数据</span>
    </button>
  </template>

</body>
</html>
