# =============================================================================
# Silver-standard golden queries for the Lodestar Stage-2 reranker.
#
# 来源：本文件由 AI 在 2026-04-21 基于 owner 网络的 bio + 公开规则自动构造，
#      属于 *silver standard* —— 任何评测数字都应明示 silver disclaimer。
#
# 构造原则（避免循环论证）：
#   * `expected_top3` / `must_not_include` 不来自 LLM judge / bge / hybrid
#     的输出，而是基于 person 的事实型字段（bio / tags / companies / 职务）
#     按 `rationale` 描述的人工规则筛出。
#   * 规则裁判看的是 person 属性；reranker 看的是 query↔bio 语义相似度。
#     两者输入互不依赖 → 评测信号独立。
#
# 升级路径：
#   * 任何一条不准 → 直接编辑 yaml 改 `expected_top3` / `must_not_include`，
#     再跑 `scripts/eval_search.py` 就会自动用新金标重算指标。
#   * 想加更多 query → 沿用同样字段；脚本不依赖任何 hard-coded id。
#
# Schema:
#   id                : 短英文 id，evaluation 报告里作 row 标识
#   category          : role-cliff | ambiguous | longtail | one-hop
#   owner             : richard | tommy
#   goal              : 自然语言原始 goal（与用户在 web 端输入完全一致）
#   rationale         : 一句话说明为什么这三个人是 expected
#   expected_top3     : 期望出现在 top-5 的人（名字按 person.name 精确匹配）
#   must_not_include  : 反例，命中 top-5 视为断崖失败（可空数组）
# =============================================================================

silver_disclaimer: |
  This file is a silver-standard golden set built by AI from owner-network
  bios + explicit rules. Hand-edit any row to upgrade individual queries to
  gold. Eval reports must label results as "silver".

