# =============================================================================
# Gold-standard golden queries for the Lodestar Stage-2 reranker.
#
# 来源 / 演进：
#   * 2026-04-21 初版由 AI 基于 owner 网络 bio 自动构造（silver）。
#   * 同日按 owner 全网络逐条人工 audit 升级为 gold：补全 silver 因 tag
#     字面规则漏判的本人（如「进化论=百亿量化私募」「幻方=头部量化」「中
#     金财富整条线=FOF/财富管理」「家办派系」等需要业内常识的判断）。
#
# 构造原则：
#   * `expected` / `must_not_include` 不来自 LLM judge / bge / hybrid 的
#     输出，而是基于 person 的事实型字段（bio / tags / companies / 职务
#     / 公司常识）+ 人工判断给出。
#   * 评测脚本里 expected 当作 ground-truth 集合用，集合大小不限于 3——
#     凡是「按 query 语义本人」的人都列入；reranker 只要把任意一个排进
#     top-5 就算 hit。
#   * 反例集合 `must_not_include` 是断崖陷阱——bi-encoder 容易因为词面
#     相近排前但实际角色错位的人（卖方资源/出身但已转行/同公司不同岗）。
#
# 升级路径：
#   * 任何一条不准 → 直接编辑 yaml，再跑 `scripts/eval_search.py`。
#   * 加 query → 沿用同样字段；脚本不依赖任何 hard-coded id。
#
# Schema:
#   id                : 短英文 id，evaluation 报告里作 row 标识
#   category          : role-cliff | ambiguous | longtail | one-hop
#   owner             : richard | tommy
#   goal              : 自然语言原始 goal（与用户在 web 端输入完全一致）
#   rationale         : 一句话说明为什么这些人是 expected / 哪些被排除
#   expected_top3     : 期望进 top-5 的本人集合（按 person.name 精确匹配，
#                       数量不限于 3；评测算 Recall@5 = |hit|/|expected|）
#   must_not_include  : 反例，命中 top-5 视为断崖失败（可空数组）
# =============================================================================

silver_disclaimer: |
  Hand-curated gold standard as of 2026-04-21. Each row was audited
  against the full owner network (richard=64 people, tommy=110 people)
  by a reviewer with industry context (e.g. 进化论 / 幻方 / 中金财富 /
  招商证券 are recognized institutions, not just bio strings).

queries:

  # ============== richard 网络 (10 条) ==============

  # ----- role-cliff (3 条) -----
  - id: r-rolecliff-1
    category: role-cliff
    owner: richard
    goal: "我想找量化私募老总"
    rationale: "本人 = 量化系私募的老板/创始人。王一平（进化论老板，进化论是
      国内百亿量化私募）/ 李靖（明确量化专家+老板）/ 建国哥（银方基金老板，
      ETF 系量化）。陈海明虽是私募基金老板但 tag 明确「主观股票多头」非量
      化，纪少敏是「一线游资」派也非量化系，均不入。俞汉清是证券卖方有
      「量化私募资源」tag 但本人非私募，Yuki陈是科技销售高频量化兴趣，
      二者都是 bi-encoder 容易错排的资源型陷阱。"
    expected_top3: [王一平, 李靖, 建国哥]
    must_not_include: [俞汉清, Yuki陈]

  - id: r-rolecliff-2
    category: role-cliff
    owner: richard
    goal: "我要找投行做并购业务的人"
    rationale: "本人 = 现职投行 + 主营并购。张坤 bio 明确「主营并购业务」+
      国联民生投行。杜晓晗虽中泰投行出身但已转公募渠道，不算本人。"
    expected_top3: [张坤]
    must_not_include: [杜晓晗]

  - id: r-rolecliff-3
    category: role-cliff
    owner: richard
    goal: "我想接触药品监管口的处长 / 局长级别官员"
    rationale: "本人 = 药监条线且职级处长以上。廉向金 = 四川药监处长，
      richard 网络唯一对口。宋伟（审批局科长）/ 陈宝岩（城市更新局科长）
      级别不够 + 条线不对，是断崖陷阱。"
    expected_top3: [廉向金]
    must_not_include: [宋伟, 陈宝岩]

  # ----- ambiguous (2 条) -----
  - id: r-ambig-1
    category: ambiguous
    owner: richard
    goal: "我想了解政府监管动态，认识能打招呼的政府关系"
    rationale: "意图广 = 政府/司法系统 + 在编官员（任意条线）。廉向金（药监
