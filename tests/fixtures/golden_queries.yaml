    owner: richard
    goal: "我想做医疗器械销售对接"
    rationale: "本人 = 医疗器械行业且能落地销售/合作。杨永兴（宝莱特业务
      经理）+ 孔焕然（AI/医疗器械老板）是 richard 网络仅有的医疗器械人。"
