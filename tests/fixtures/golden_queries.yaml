      不是监管，李品一（工总行）是国有银行职员不是监管，均不入。"
    expected_top3: [廉向金, 宋伟, 陈宝岩, 蔡长余]
    must_not_include: []

  - id: r-ambig-2
    category: ambiguous
    owner: richard
    goal: "我想找深圳的金融圈朋友"
    rationale: "城市∋深圳 AND 行业∈{私募基金/券商/期货/公募基金}。私募系：
      李靖（深圳老板）/ 胡77（深圳基金经理）/ 王一平（深圳进化论老板）/
      大钊（进化论营销总监，城市含深圳）；券商：王毓（华林证券深圳量化）。
      陈宝岩虽在深圳但行业是政府不算金融圈。"
    expected_top3: [李靖, 胡77, 王一平, 大钊, 王毓]
    must_not_include: []

  # ----- longtail (3 条) -----
  - id: r-longt-1
    category: longtail
    owner: richard
    goal: "我想找懂跨境套利和加密货币的人"
    rationale: "胡77 tag 同时包含「加密货币专家/跨境套利/外资背景/套利」，
